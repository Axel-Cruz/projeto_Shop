    <style>
       
     

        /*card das cartas*/

        .produto {
            width: 200px;
            /*largura*/
            background-color: #ccc;
            gap: 10px;
            /*distancia igual entre cada elemento*/
            margin-top: 40px;
            /*afasta de cima pra baixo*/

            display: flex;
            /*elementos flexiveis*/
            flex-direction: column;
            /*um embaixo do outro*/
        }

        .produto_imagem_container {
            background-color: #FFE739;
            padding-left: 10px;
            /*vai dar distancia na esquerda*/
            padding-right: 10px;
            /*vai dar distancia na direita*/
        }

        .produto_imagem {
            width: 100%;
        }

        .produto_informacao_container {
            padding: 10px;
            /*margem dentro da div*/

            display: flex;
            flex-direction: column;
            /*um embaixo do outro*/
            gap: 10px;
            /*espaçamento entro os elementos*/
        }

        .produtos_container {
            max-width: 900px; /*largura da tela,*/
            margin: 40px auto; /*40px de cima pra baixo, o auto vai destribuir nas laterais*/

            display: flex;
            gap: 10px;/*margem entre cada elemento*/
            flex-wrap: wrap; /*se nao couber na pagina vai jogar os elementos pra baixo*/
            justify-content: space-between;/*espaço igual entre os elementos*/
            justify-content: center; /*centraliza os filhos*/
        }
    </style>
</head>

<body>

    <div class="container_inicial">
        <h1>Bem-vindo à GeekShop</h1>
        <p>Encontre as melhores cartas colecionáveis para sua coleção</p>
        <button>Exolorar</button>
    </div>
